<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clothing Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f8f8f8;
    }

    header {
      background-color: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background-color: #555;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .price {
      color: #e91e63;
      font-weight: bold;
    }

    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>My Clothing Shop</h1>
  <p>Trendy & Affordable Fashion</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Men</a>
  <a href="#">Women</a>
  <a href="#">Contact</a>
</nav>

<div class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" alt="T-Shirt">
    <h3>Casual T-Shirt</h3>
    <p class="price">Rs. 1200</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246" alt="Dress">
    <h3>Summer Dress</h3>
    <p class="price">Rs. 2500</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f" alt="Jacket">
    <h3>Denim Jacket</h3>
    <p class="price">Rs. 3500</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd53" alt="Kurti">
    <h3>Stylish Kurti</h3>
    <p class="price">Rs. 1800</p>
  </div>

</div>

<footer>
  <p>© 2026 My Clothing Shop | All Rights Reserved</p>
</footer>

</body>
</html>
